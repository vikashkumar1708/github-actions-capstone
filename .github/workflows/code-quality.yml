# linting and SAST scan
#lint - flake & SAST - Bandit
name: Code quality

on:
    workflow_call:            #jb tk koi aur workflow isko call ni krega tb kk ye ni chlega

jobs:
    validate:
      runs-on: ubuntu-latest
      strategy: 
          fail-fast: false
          matrix:
            python-version: ["3.11","3.12","3.13"]

      steps: 
            - name: checkout code
              uses: actions/checkout@v4

            - name: setup python ${{ matrix.python-version}}
              uses: actions/setup-python@v5
              with:
                python-version: ${{ matrix.python-version}}

            - name: install libraries and dependencies
              run: pip install -r requirements.txt

            - name: run linter
              run: flake8 app.py

            - name: run SAST
              run: bandit -r app.py


